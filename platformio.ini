; ============================================================
;  DeskBuddy — platformio.ini
;  Board: Wemos Lolin D32 (ESP32)
; ============================================================

[env:lolin_d32]
platform     = espressif32
board        = lolin_d32
framework    = arduino

; Serial monitor speed
monitor_speed = 115200

; Partition scheme — larger app space for web UI + libs
board_build.partitions = min_spiffs.csv

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0
    ; TFT_eSPI — tell it to use our User_Setup.h
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=17
    -DTFT_BL=32
    -DTFT_BACKLIGHT_ON=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000

; Libraries (PlatformIO registry IDs or GitHub URLs)
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.0.0
    ; RoboEyesTFT — install manually from:
    ; https://github.com/yousseftechdev/RoboEyesTFT
    ; Copy library folder to lib/ directory in this project
