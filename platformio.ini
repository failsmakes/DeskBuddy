; ============================================================
;  DeskBuddy - platformio.ini
;  Board: Wemos Lolin D32 (ESP32)
; ============================================================

[env:lolin_d32]
platform     = espressif32
board        = lolin_d32
framework    = arduino

monitor_speed = 115200

; Partition: uygulamaya daha fazla flash yer acmak icin
board_build.partitions = min_spiffs.csv

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0
    ; ---- Brownout korumasini devre disi birak ----
    ; WiFi AP baslatmasi anlik yuksek akim cekiyor (~350mA).
    ; Zayif USB kablo/hub veya USB-TTL donusturucu ile beslenince
    ; gerilim dusup brownout reset dongusune giriyor.
    ; Kalici cozum: iyi kalite kablo + dogrudan bilgisayar USB'si.
    ; Yazilim cozumu olarak brownout esigini en dusuge aliyoruz.
    -DARDUINO_ESP32_NO_BROWNOUT_DETECTOR
    ; ---- TFT_eSPI - ILI9341 pin tanimlari ----
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=17
    -DTFT_BL=32
    -DTFT_BACKLIGHT_ON=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.0.0
    ; RoboEyesTFT - GitHub'dan manuel kur:
    ; https://github.com/yousseftechdev/RoboEyesTFT
    ; lib/ klasorune kopyalayin
